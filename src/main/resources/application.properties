spring.application.name=sus-api

# Database Configuration (PostgreSQL via Supabase Connection Pooler)
# Use environment variables for sensitive data (DB_URL, DB_USERNAME, DB_PASSWORD)
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:api_user.annrgvauosxpylyvjqiw}
spring.datasource.password=${DB_PASSWORD:SusApi2026!}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (Disabled by default, but kept for occasional debug if needed)
spring.h2.console.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.joaopaulo.sus=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Security (Default User for Basic Auth)
spring.security.user.name=admin
spring.security.user.password=admin123

server.port=8081
