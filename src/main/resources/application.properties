spring.application.name=sus-api

# H2 Database (Development)
spring.datasource.url=jdbc:h2:mem:susdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL (Production Template - uncomment and configure as needed)
# spring.datasource.url=jdbc:postgresql://localhost:5432/sus_db
# spring.datasource.username=postgres
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.joaopaulo.sus=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Security (Default User for Basic Auth)
spring.security.user.name=admin
spring.security.user.password=admin123

server.port=8081
