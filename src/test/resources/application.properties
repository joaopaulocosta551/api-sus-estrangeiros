# Test Database Configuration (PostgreSQL)
# Use separate environment variables for tests to avoid data loss in your main DB
spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/sus_test_db}
spring.datasource.username=${TEST_DB_USERNAME:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:password}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Recreate the schema for every test run to ensure a clean state
spring.jpa.hibernate.ddl-auto=create-drop
